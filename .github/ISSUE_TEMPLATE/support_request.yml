### Expected behavior
What did you expect to happen?

### Actual behavior
What happened instead? Include exact error messages, stack traces, or other output. Paste logs using code blocks.

### Repository / commit / tag
Which version of the template are you using? (e.g., repository tag, commit SHA, branch)

### Environment
Include relevant environment information, for example:
- OS (e.g., macOS 12.3, Ubuntu 22.04)
- Shell / terminal
- Tooling & versions (Node, Python, Terraform, etc.)
- Any other relevant environment/context

### Configuration & relevant files
Attach or paste the minimal configuration or file snippets necessary to reproduce. Use a gist or link if content is large.

### What I’ve already tried
List debugging steps you’ve attempted and their results.

### Screenshots / recordings
(Optional) Include screenshots or short recordings that help explain the issue.

### Additional context
Anything else that may help maintainers diagnose or reproduce the issue.

