name: Audit Log

# Capture every meaningful repository event and record it in a structured log.
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - closed
      - reopened
      - synchronize
      - review_requested
      - review_request_removed
  pull_request_review:
    types:
      - submitted
      - dismissed
  issues:
    types:
      - opened
      - closed
      - reopened
      - deleted
  fork:
  member:
    types:
      - added
      - removed
      - edited
  release:
    types:
      - created
      - published
      - deleted
  workflow_run:
    workflows:
      - "CodeQL Security Scan"
      - "Dependency Review"
      - "PR Validation"
      - "Secret Detection"
      - "Repository Lockdown"
      - "Access Monitor"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  audit:
    name: Record Audit Event
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare audit-logs branch
        run: |
          if git ls-remote --exit-code --heads origin audit-logs > /dev/null 2>&1; then
            git fetch origin audit-logs:refs/heads/audit-logs
            git checkout audit-logs
          else
            git checkout --orphan audit-logs
            git rm -rf . 2>/dev/null || true
          fi

      - name: Write audit log entry
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at || github.event.issue.updated_at }}
        run: |
          LOG_DIR="audit-logs/$(date -u +%Y-%m)"
          mkdir -p "$LOG_DIR"
          LOG_FILE="$LOG_DIR/$(date -u +%Y-%m-%dT%H-%M-%S)Z-${RUN_ID}.json"
          ENTRY=$(jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg event "$EVENT_NAME" \
            --arg action "$EVENT_ACTION" \
            --arg actor "$ACTOR" \
            --arg ref "$REF" \
            --arg sha "$SHA" \
            --arg repo "$REPO" \
            --arg run_id "$RUN_ID" \
            --arg run_url "$RUN_URL" \
            '{timestamp: $ts, event: $event, action: $action, actor: $actor, ref: $ref, sha: $sha, repository: $repo, run_id: $run_id, run_url: $run_url}')
          echo "$ENTRY" > "$LOG_FILE"
          echo "Audit entry written to $LOG_FILE:"
          echo "$ENTRY" | jq .

      - name: Commit audit log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audit-logs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "audit: log ${{ github.event_name }} event by ${{ github.actor }} [skip ci]"
            for attempt in 1 2 3; do
              if git push origin audit-logs; then
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "Push attempt $attempt failed, rebasing onto latest remote and retrying..."
                git pull --rebase origin audit-logs || { echo "⚠️ Rebase failed; audit entry committed locally but not pushed."; break; }
              else
                echo "⚠️ Warning: Could not push audit log after 3 attempts."
              fi
            done
          fi
