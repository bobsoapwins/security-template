name: Support Request
description: Ask for help or report a problem that is not a bug or security issue.
title: "[SUPPORT] "
labels:
  - support
  - needs-triage
assignees:
  - bobsoapwins
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the form below so we can help you as quickly as possible.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What type of support do you need?
      options:
        - General question
        - Configuration or setup help
        - Documentation unclear or missing
        - Access or permissions issue
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe what you need help with.
      placeholder: Explain your question or problem in detail.
    validations:
      required: true

  - type: textarea
    id: steps_taken
    attributes:
      label: Steps Already Taken
      description: What have you already tried to resolve this?
      placeholder: |
        1. Tried '...'
        2. Checked '...'
        3. Still experiencing '...'
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references that may be helpful.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: I have searched existing issues to confirm this has not already been asked.
          required: true
        - label: This request does not include any sensitive or confidential information.
          required: true
